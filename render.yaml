services:
  - type: worker
    name: coachkai-bot
    runtime: python
    repo: https://github.com/rafamiz/coachkai
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
